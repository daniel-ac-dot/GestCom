<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regístrate en GestCom</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./css/register-style.css">
</head>
<body>

    <div class="main-container">
        <div class="form-side">
            <button class="retroceder-btn"><i class="fa-solid fa-angle-left"></i></button>
            
            <div class="form-wrapper">
                <h1>Registro</h1>
                <p class="subtitle">¿Ya tienes una cuenta? <a href="./login.html">Ingresa aquí</a></p>
                
                <form>
                    <div class="input-group">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="nombre" name="nombre" placeholder="Nombre" required>
                    </div>

                    <div class="input-group">
                        <i class="fa-regular fa-user"></i>
                        <input type="text" id="apellido" name="apellido" placeholder="Apellido" required>
                    </div>
                    
                    <div class="input-group">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="correo_usuario" name="correo_usuario" placeholder="Correo electrónico" required>
                    </div>
                    
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="Contraseña" required>
                    </div>
                    
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="confirmar_password" name="confirmar_password" placeholder="Contraseña, nuevamente" required>
                    </div>
                    
                    <button type="submit" class="btn-primary">Registrarme</button>
                </form>
            </div>
        </div>

        <div class="info-side">
            <div class="info-wrapper">
                <div class="logo-placeholder"><img class="loguito" src="../Frontend/assets/img/iconGestCom.png" alt="Logo"></div> 
                <p class="info-text">Solo tienes que terminar el registro para descubrir las herramientas que tenemos para ti</p>
                <div class="character-placeholder">
                    🤖
                </div>
            </div>
        </div>
    </div>

</body>
</html>

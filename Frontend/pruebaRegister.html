<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Prueba Registro</title>
</head>

<body>

    <h2>Registro de Usuario - GestCom</h2>

    <input type="text" id="nombre" placeholder="Nombre"><br><br>

    <input type="text" id="apellido" placeholder="Apellido"><br><br>

    <input type="date" id="fecha_nacimiento"><br><br>

    <input type="email" id="correo_usuario" placeholder="Correo"><br><br>

    <input type="text" id="numero_telefonico" placeholder="Teléfono"><br><br>

    <input type="text" id="nacionalidad" placeholder="Nacionalidad"><br><br>

    <select id="genero">
        <option value="M">Masculino</option>
        <option value="F">Femenino</option>
    </select>

    <br><br>

    <input type="password" id="password" placeholder="Contraseña"><br><br>

    <button onclick="registrar()">
        Registrar Usuario
    </button>

    <pre id="resultado"></pre>

    <script>

        async function registrar() {

            const usuario = {

                nombre: document.getElementById("nombre").value,

                apellido: document.getElementById("apellido").value,

                fecha_nacimiento: document.getElementById("fecha_nacimiento").value,

                correo_usuario: document.getElementById("correo_usuario").value,

                numero_telefonico: document.getElementById("numero_telefonico").value,

                nacionalidad: document.getElementById("nacionalidad").value,

                genero: document.getElementById("genero").value,

                password: document.getElementById("password").value

            };

            const respuesta = await fetch(
                "http://localhost:3000/api/auth/register",
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(usuario)
                }
            );

            const datos = await respuesta.json();

            document.getElementById("resultado").textContent =
                JSON.stringify(datos, null, 2);

        }

    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Prueba Registro</title>
</head>

<body>

    <h2>Prueba Registro Basico - GestCom</h2>

    <input type="text" id="nombre" placeholder="Nombre"><br><br>

    <input type="text" id="apellido" placeholder="Apellido"><br><br>

    <input type="email" id="correo_usuario" placeholder="Correo"><br><br>

    <input type="password" id="password" placeholder="Contraseña"><br><br>

    <input type="password" id="confirmar_password" placeholder="Confirmar contraseña"><br><br>

    <button onclick="registrar()">
        Registrar Usuario
    </button>

    <pre id="resultado"></pre>

    <script>

        async function registrar() {

            const password = document.getElementById("password").value;

            const confirmarPassword =
                document.getElementById("confirmar_password").value;

            if (password !== confirmarPassword) {
                document.getElementById("resultado").textContent =
                    JSON.stringify({
                        mensaje: "Las contraseñas no coinciden"
                    }, null, 2);

                return;
            }

            const usuario = {

                nombre: document.getElementById("nombre").value,

                apellido: document.getElementById("apellido").value,

                correo_usuario: document.getElementById("correo_usuario").value,

                password

            };

            const respuesta = await fetch(
                "http://localhost:3000/api/auth/register",
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(usuario)
                }
            );

            const datos = await respuesta.json();

            document.getElementById("resultado").textContent =
                JSON.stringify(datos, null, 2);

        }

    </script>

</body>

</html>
